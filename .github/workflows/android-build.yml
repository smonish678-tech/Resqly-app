name: Android Build (APK + AAB)

# Triggers:
#   - Manually via "Run workflow" (any branch)
#   - Automatically on every push to main
on:
  workflow_dispatch:
    inputs:
      build_release:
        description: "Also build signed release AAB (requires keystore secrets)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/android-build.yml"

permissions:
  contents: read

jobs:
  android:
    name: Build Resqly Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Production backend URL baked into the APK at build time.
      # Override this in your repo by setting the variable in:
      #   Settings -> Secrets and variables -> Actions -> Variables -> REACT_APP_BACKEND_URL
      REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL || 'https://resqly-launch.emergent.host' }}
      ENABLE_HEALTH_CHECK: "false"
      GENERATE_SOURCEMAP: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build web bundle (CRA / craco)
        run: yarn build

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # -----------------------------------------------------------------------
      # 1) DEBUG APK — always built. Sideload-able, NOT for the Play Store.
      # -----------------------------------------------------------------------
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: resqly-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # -----------------------------------------------------------------------
      # 2) RELEASE AAB + APK — built only if keystore secrets are configured.
      #    Secrets required (Settings -> Secrets and variables -> Actions):
      #       RESQLY_KEYSTORE_BASE64    -> base64 of the .jks file
      #       RESQLY_KEYSTORE_PASSWORD  -> store password
      #       RESQLY_KEY_ALIAS          -> e.g. resqly-release
      #       RESQLY_KEY_PASSWORD       -> key password
      # -----------------------------------------------------------------------
      - name: Decode signing keystore
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_release == 'true' }}
        id: keystore
        env:
          KS_B64: ${{ secrets.RESQLY_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::RESQLY_KEYSTORE_BASE64 secret not set — skipping signed release build."
          else
            echo "$KS_B64" | base64 -d > "${{ github.workspace }}/release-signing.jks"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded to ${{ github.workspace }}/release-signing.jks"
          fi

      - name: Build Release AAB + APK
        if: steps.keystore.outputs.skip == 'false'
        working-directory: frontend/android
        env:
          RESQLY_KEYSTORE_PATH: ${{ github.workspace }}/release-signing.jks
          RESQLY_KEYSTORE_PASSWORD: ${{ secrets.RESQLY_KEYSTORE_PASSWORD }}
          RESQLY_KEY_ALIAS: ${{ secrets.RESQLY_KEY_ALIAS }}
          RESQLY_KEY_PASSWORD: ${{ secrets.RESQLY_KEY_PASSWORD }}
        run: ./gradlew --no-daemon bundleRelease assembleRelease

      - name: Upload Release AAB (Play Store)
        if: steps.keystore.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: resqly-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload Release APK
        if: steps.keystore.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: resqly-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Cleanup keystore from workspace
        if: always() && steps.keystore.outputs.skip == 'false'
        run: rm -f "${{ github.workspace }}/release-signing.jks"
